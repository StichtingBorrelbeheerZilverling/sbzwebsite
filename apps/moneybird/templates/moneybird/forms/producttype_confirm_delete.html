{% extends 'base.html' %}
{% load bootstrap_form %}

{% block content %}
{% endblock %}

{% block modals %}
    {% bootstrap_delete_modal object 'moneybird:product_type_delete' object.pk %}
    <script>
        // Auto-open the delete modal on page load
        document.addEventListener("DOMContentLoaded", function () {
            var modal = document.getElementById("delete-ProductType-{{ object.pk }}");
            if (modal) {
                $("#delete-ProductType-{{ object.pk }}").modal("show");
            }
        });
    </script>
{% endblock %}
